name: Add New App

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Category (e.g., tools.md, communication.md)'
        required: True
        type: choice
        options:
          - android_tv.md
          - android_wear.md
          - business.md
          - communication.md
          - education.md
          - finance.md
          - game.md
          - health_fitness.md
          - life_style.md
          - multi_media.md
          - news_and_magazines.md
          - personalization.md
          - productivity.md
          - social_network.md
          - tools.md
          - travel_and_local.md
      app_name:
        description: 'App Name'
        required: True
      repo_url:
        description: 'GitHub Repository URL'
        required: True
      store_url:
        description: 'Store/Download URL (Optional)'
        required: False
      custom_desc:
        description: 'Custom Description (Optional, uses GitHub desc if empty)'
        required: False

jobs:
  add-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pass inputs through env vars instead of interpolating them directly into
      # the shell, to avoid command injection via crafted app names / URLs.
      - name: Run Add App Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_NAME: ${{ github.event.inputs.app_name }}
          INPUT_REPO: ${{ github.event.inputs.repo_url }}
          INPUT_STORE: ${{ github.event.inputs.store_url }}
          INPUT_DESC: ${{ github.event.inputs.custom_desc }}
        run: |
          python scripts/add_app.py \
            --category "$INPUT_CATEGORY" \
            --name "$INPUT_NAME" \
            --repo "$INPUT_REPO" \
            --store "$INPUT_STORE" \
            --desc "$INPUT_DESC"

      - name: Commit and push changes
        env:
          INPUT_NAME: ${{ github.event.inputs.app_name }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "feat: add $INPUT_NAME to $INPUT_CATEGORY"
          git pull --rebase origin master
          git push
